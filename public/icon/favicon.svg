<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- Gold gradients -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7e7b5"/>
      <stop offset="35%" stop-color="#d9b36c"/>
      <stop offset="70%" stop-color="#b8863b"/>
      <stop offset="100%" stop-color="#f3deb0"/>
    </linearGradient>

    <linearGradient id="roseGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d0b5"/>
      <stop offset="50%" stop-color="#d59a73"/>
      <stop offset="100%" stop-color="#b06d47"/>
    </linearGradient>

    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#17345c"/>
      <stop offset="100%" stop-color="#0b1b33"/>
    </radialGradient>
  </defs>

  <!-- Outer Circle -->
  <circle
    cx="400"
    cy="400"
    r="320"
    fill="url(#bg)"
    stroke="url(#gold)"
    stroke-width="12"/>

 

 

  <!-- Main M -->
  <text
    x="400"
    y="540"
    text-anchor="middle"
    font-size="510"
    font-family="Times New Roman, serif"
    fill="url(#roseGold)"
    letter-spacing="6">
    M
  </text>

  <!-- Bottom text -->
  <text
    x="400"
    y="610"
    text-anchor="middle"
    font-size="55"
    font-family="Times New Roman, serif"
    fill="url(#gold)"
    letter-spacing="3">
    MOVIE SHARK
  </text>
</svg>