<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="movieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0aeedbfb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="150" r="140" fill="#211d33" stroke="#9e770dee" stroke-width="4"/>



  <!-- Large M letter -->
     <text x="201" y="230" text-anchor="middle" font-family="Copperplate Gothic Bold"
        font-size="230" font-weight="bold" fill="#9e770dee" letter-spacing="4">
    M
  </text>


  <!-- Title text -->
  <text x="201" y="260" text-anchor="middle" font-family="Bodoni MT Black" 
        font-size="20" font-weight="bold" fill="#0aeedbfb" letter-spacing="4">
    MovieShark
  </text>
</svg>