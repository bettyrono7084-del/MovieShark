<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4d6d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shark body -->
  <path d="M 20 40 Q 35 30 50 25 Q 65 30 70 40 L 75 60 Q 72 72 50 80 Q 28 72 25 60 Z" 
        fill="url(#grad1)" 
        stroke="#e8b84b" 
        stroke-width="1.5"
        stroke-linejoin="round"/>
  
  <!-- Shark snout -->
  <path d="M 25 52 L 10 55 L 20 58 Z" 
        fill="#ff4d6d" 
        stroke="#e8b84b" 
        stroke-width="1"
        stroke-linejoin="round"/>
  
  <!-- Shark dorsal fin -->
  <path d="M 50 25 L 45 8 L 50 25 L 55 8 Z" 
        fill="url(#grad1)" 
        stroke="#e8b84b" 
        stroke-width="1.2"
        stroke-linejoin="round"/>
  
  <!-- Shark eye -->
  <circle cx="60" cy="42" r="2.5" 
          fill="#080a0f" 
          stroke="#e8b84b" 
          stroke-width="0.5"/>
  
  <!-- Shark eye shine -->
  <circle cx="61" cy="41" r="0.8" 
          fill="#e8b84b"/>
  
  <!-- Play button integrated -->
  <polygon points="78,55 78,70 93,62.5" 
           fill="#e8b84b" 
           stroke="#e8b84b" 
           stroke-width="0.8"
           stroke-linejoin="round"/>
</svg>